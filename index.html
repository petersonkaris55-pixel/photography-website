<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Photography portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Karis' Photography</h1>
    </header>
    <!-- intro section -->
    <section id="intro">
      <h2>About this website</h2>
      <p>
        Photography is<strong
          > a way of feeling,touching, and of loving.what you have caught on film
          is captured forever.
        </strong>
      </p>
    </section>
    <!-- gallrey section -->
    <section id="gallarey">
      <h2>My Favourite Photos</h2>
      <ul>
        <li></li> 
        <li></li>
      </ul>
    </section>
    <!-- contact section -->
    <section id="contact">
      <h2>Get in Touch</h2>
      <form>
        <label for="full-name">Name:</label><br />
        <input type="text" id="full-name" name="full-name" /><br /><br />
        <!-- email input -->
        <label for="email">Email:</label><br />
        <input type="email" id="email" name="email" /><br /><br />
        <!-- message input -->
        <label for="message">message</label><br /><br />
        <textarea id="message" name="message" rows="4"></textarea><br /><br />
        <button type="submit">send</button>
      </form>
    </section>
  </body>
</html>
